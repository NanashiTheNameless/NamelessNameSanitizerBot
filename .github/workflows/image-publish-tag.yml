name: Image Publish Tag (GHCR)
run-name: Publish image tag ${{ github.event_name == 'workflow_dispatch' && inputs.version_tag || github.ref_name }}

"on":
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version_tag:
        description: Image tag to publish, for example v0.1.2.3
        required: true
        type: string

concurrency:
  group: image-publish-tag-ghcr
  cancel-in-progress: false

jobs:
  publish:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/image-publish-reusable.yml
    with:
      publish_name: Build and Push Tag
      checkout_ref: ${{ github.ref }}
      image_version: ${{ github.event_name == 'workflow_dispatch' && inputs.version_tag || github.ref_name }}
      docker_tag: ${{ github.event_name == 'workflow_dispatch' && inputs.version_tag || github.ref_name }}
      latest: false

  update-release-tag:
    name: Update release tag
    if: github.event_name == 'workflow_dispatch'
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Ensure release tag exists
        env:
          VERSION_TAG: ${{ inputs.version_tag }}
        run: git show-ref --verify --quiet "refs/tags/$VERSION_TAG"

      - name: Update release tag
        uses: NanashiTheNameless/action-create-tag@main
        with:
          tag: ${{ inputs.version_tag }}
          commit_sha: ${{ github.sha }}
          tag_exists_error: false
          force_push_tag: true
