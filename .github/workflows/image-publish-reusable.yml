name: Image Publish Reusable (GHCR)

"on":
  workflow_call:
    inputs:
      publish_name:
        description: Job name to display in Actions
        required: true
        type: string
      checkout_ref:
        description: Git ref to build from
        required: true
        type: string
      image_version:
        description: Value for NNSB_IMAGE_VERSION
        required: true
        type: string
      docker_tag:
        description: Image tag to publish
        required: true
        type: string
      latest:
        description: Whether to mark the published image as latest
        required: true
        type: boolean

env:
  GHCR_IMAGE: ghcr.io/nanashithenameless/namelessnamesanitizerbot

jobs:
  build-and-push:
    name: ${{ inputs.publish_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ inputs.checkout_ref }}

      - name: Resolve git SHA
        id: git
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Log in to GHCR
        uses: docker/login-action@c144859092e8e353f3e118b0b329679a62351c3e
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
          flavor: |
            latest=${{ inputs.latest }}
          tags: |
            type=raw,value=${{ inputs.docker_tag }}
          labels: |
            org.opencontainers.image.licenses=https://nnsb.namelessnanashi.dev/license

      - name: Build and push image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: .
          push: true
          provenance: mode=min
          platforms: linux/amd64,linux/arm64
          build-args: |
            NNSB_IMAGE_VERSION=${{ inputs.image_version }}
            NNSB_GIT_SHA=${{ steps.git.outputs.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
