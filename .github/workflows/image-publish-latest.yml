name: Image Publish Latest (GHCR)

"on":
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    uses: ./.github/workflows/image-publish-reusable.yml
    with:
      publish_name: Build and Push Latest
      checkout_ref: ${{ github.ref }}
      image_version: latest
      docker_tag: latest
      latest: true
